            </ul>
        </nav>

    <main>
        <section>
<img
src="image/contact.png"
alt="Contact"
class="contact-image">

            <h2>Contact Me</h2>

            <form action="#" method="post">
                <div>
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required>
                </div>

                <div>
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required>
                </div>

                <div>
                    <label for="subject">Subject</label>
                    <input
                        type="text"
                        id="subject"
                        name="subject"
                        required>
                </div>

                <div>
                    <label for="message">Message</label>
                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </section>
        <section class="contact-info">
            <h3>contact information</h3>
            <p>Email:ekramnuredin91@gmail.com</p>
            <p>phone:+251991874693</p>
            <p>thank you for visiting my website feel free
                to send message using the contact from above.
            </p>
        </section>
    </main>
